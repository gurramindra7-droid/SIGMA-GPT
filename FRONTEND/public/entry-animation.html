<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SIGMA-GPT — Entry</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: pointer;
  }
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .overlay-title {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
    text-shadow:
      0 0 10px rgba(0,255,255,0.8),
      0 0 30px rgba(0,255,255,0.5),
      0 0 60px rgba(0,255,255,0.3),
      0 0 120px rgba(0,255,255,0.15);
    opacity: 0;
    transform: scale(0.8);
    animation: titleIn 1.6s cubic-bezier(0.17,0.89,0.32,1.28) 0.5s forwards;
  }
  .overlay-subtitle {
    font-size: clamp(14px, 2.5vw, 28px);
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-top: 8px;
    text-shadow: 0 0 20px rgba(0,255,255,0.3);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s ease 2.2s forwards;
  }
  .overlay-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 3.4s forwards;
  }
  .badge {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: clamp(10px, 1.2vw, 13px);
    font-family: 'Arial', 'Helvetica', sans-serif;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(0,255,255,0.3);
    background: rgba(0,255,255,0.06);
    color: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .overlay-tagline {
    position: fixed;
    bottom: clamp(20px, 4vh, 48px);
    left: 0;
    right: 0;
    text-align: center;
    font-size: clamp(13px, 1.8vw, 22px);
    font-family: 'Arial', 'Helvetica', sans-serif;
    font-weight: 800;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.8);
    text-shadow:
      0 0 10px rgba(255,255,255,0.2),
      0 0 30px rgba(0,255,255,0.1);
    opacity: 0;
    animation: fadeUp 1s ease 4.6s forwards;
    z-index: 10;
    pointer-events: none;
  }

  .overlay-tagline::before {
    content: '';
    display: block;
    width: clamp(40px, 6vw, 80px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,107,53,0.6), transparent);
    margin: 0 auto clamp(10px, 1.5vh, 18px);
  }

  .overlay-tagline span {
    color: #FF6B35;
    font-size: 1.15em;
    font-weight: 900;
    letter-spacing: 6px;
    text-shadow:
      0 0 10px rgba(255,107,53,0.8),
      0 0 30px rgba(255,107,53,0.5),
      0 0 60px rgba(255,107,53,0.3);
  }
  @keyframes titleIn {
    0%   { opacity: 0; transform: scale(0.8); filter: blur(8px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .click-hint {
    position: fixed;
    bottom: clamp(72px, 10vh, 100px);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(10px, 1.2vw, 13px);
    font-family: 'Arial', 'Helvetica', sans-serif;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    animation: pulseHint 2.5s ease-in-out infinite 5s, fadeUp 0.8s ease 5s forwards;
  }
  @keyframes pulseHint {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.6; }
  }
  @media (max-width: 600px) {
    .overlay-title { letter-spacing: 2px; }
    .overlay-subtitle { letter-spacing: 3px; }
    .badge { padding: 4px 12px; letter-spacing: 1px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="overlay">
  <div class="overlay-title">SIGMA-GPT</div>
  <div class="overlay-subtitle">AI Copilot &middot; Next Generation</div>
  <div class="overlay-badges">
    <span class="badge">Research</span>
    <span class="badge">Technology</span>
    <span class="badge">Innovation</span>
    <span class="badge">Analysis</span>
    <span class="badge">Intelligence</span>
  </div>
</div>

<div class="click-hint">&mdash; tap to ignite &mdash;</div>

<div class="overlay-tagline">ENGINEERED BY <span>INDRA</span></div>

    ctx.shadowColor = 'hsla(' + hue + ', 100%, 70%, 0.8)';
