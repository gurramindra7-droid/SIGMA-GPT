<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SIGMA-GPT — Entry</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: pointer;
  }
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .overlay-title {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
    text-shadow:
      0 0 10px rgba(0,255,255,0.8),
      0 0 30px rgba(0,255,255,0.5),
      0 0 60px rgba(0,255,255,0.3),
      0 0 120px rgba(0,255,255,0.15);
    opacity: 0;
    transform: scale(0.8);
    animation: titleIn 1.6s cubic-bezier(0.17,0.89,0.32,1.28) 0.5s forwards;
  }
  .overlay-subtitle {
    font-size: clamp(14px, 2.5vw, 28px);
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-top: 8px;
    text-shadow: 0 0 20px rgba(0,255,255,0.3);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s ease 2.2s forwards;
  }
  .overlay-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 3.4s forwards;
  }
  .badge {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: clamp(10px, 1.2vw, 13px);
    font-family: 'Arial', 'Helvetica', sans-serif;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(0,255,255,0.3);
    background: rgba(0,255,255,0.06);
    color: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: all 0.3s ease;
  }
  .badge:hover {
    border-color: rgba(0,255,255,0.7);
    background: rgba(0,255,255,0.15);
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
  }
  .overlay-tagline {
    position: fixed;
    bottom: clamp(20px, 4vh, 48px);
    left: 0;
    right: 0;
    text-align: center;
    font-size: clamp(13px, 1.8vw, 22px);
    font-family: 'Arial', 'Helvetica', sans-serif;
    font-weight: 800;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.8);
    text-shadow:
      0 0 10px rgba(255,255,255,0.2),
      0 0 30px rgba(0,255,255,0.1);
    opacity: 0;
    animation: fadeUp 1s ease 4.6s forwards;
    z-index: 10;
    pointer-events: none;
  }
  .overlay-tagline::before {
    content: '';
    display: block;
    width: clamp(40px, 6vw, 80px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,107,53,0.6), transparent);
    margin: 0 auto clamp(10px, 1.5vh, 18px);
  }
  .overlay-tagline span {
    color: #FF6B35;
    font-size: 1.15em;
    font-weight: 900;
    letter-spacing: 6px;
    text-shadow:
      0 0 10px rgba(255,107,53,0.8),
      0 0 30px rgba(255,107,53,0.5),
      0 0 60px rgba(255,107,53,0.3);
  }
  @keyframes titleIn {
    0%   { opacity: 0; transform: scale(0.8); filter: blur(8px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .click-hint {
    position: fixed;
    bottom: clamp(72px, 10vh, 100px);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(10px, 1.2vw, 13px);
    font-family: 'Arial', 'Helvetica', sans-serif;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    animation: pulseHint 2.5s ease-in-out infinite 5s, fadeUp 0.8s ease 5s forwards;
  }
  @keyframes pulseHint {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.6; }
  }
  /* Core glow ring behind text */
  .core-glow {
    position: fixed;
    z-index: 5;
    pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, rgba(0,100,200,0.03) 40%, transparent 70%);
    animation: corePulse 4s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.05); opacity: 1; }
  }
  @media (max-width: 600px) {
    .overlay-title { letter-spacing: 2px; }
    .overlay-subtitle { letter-spacing: 3px; }
    .badge { padding: 4px 12px; letter-spacing: 1px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="overlay">
  <div class="overlay-title">SIGMA-GPT</div>
  <div class="overlay-subtitle">AI Copilot &middot; Next Generation</div>
  <div class="overlay-badges">
    <span class="badge">✦ Research</span>
    <span class="badge">✦ Technology</span>
    <span class="badge">✦ Innovation</span>
    <span class="badge">✦ Analysis</span>
    <span class="badge">✦ Intelligence</span>
  </div>
</div>

<div class="click-hint">&mdash; tap to ignite &mdash;</div>

<div class="overlay-tagline">ENGINEERED BY <span>INDRA</span></div>

<script>
(function() {
  'use strict';

  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  var W, H, cx, cy, dpr;
  var t = 0;
  var timeAccum = 0;
  var lastFrameTime = 0;
  var burstParticles = [];
  var animId;

  // ── Starfield init ───────────────────────────────────────────────
  var starCount = 400;
  var stars = [];
  function initStars() {
    stars = [];
    for (var si = 0; si < starCount; si++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.8 + 0.2,
        b: 0.3 + Math.random() * 0.7,
        twinkleSpeed: 0.5 + Math.random() * 3,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  // ── Resize ───────────────────────────────────────────────────────
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initStars();
    initStreams();
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Orbital Ring Data ────────────────────────────────────────────
  var ringData = [
    { label: 'RESEARCH',      tilt: 0.20, speed: 0.30, radius: 0.20, hue: 180, phase: 0 },
    { label: 'TECHNOLOGY',    tilt: 0.35, speed: 0.22, radius: 0.28, hue: 200, phase: 1.2 },
    { label: 'INNOVATION',    tilt: 0.50, speed: 0.16, radius: 0.36, hue: 220, phase: 2.8 },
    { label: 'ANALYSIS',      tilt: 0.25, speed: 0.11, radius: 0.43, hue: 160, phase: 4.1 },
    { label: 'INTELLIGENCE',  tilt: 0.42, speed: 0.07, radius: 0.50, hue: 240, phase: 5.5 },
  ];

  // ── Energy Streams ───────────────────────────────────────────────
  var streamCount = 7;
  var streams = [];
  function initStreams() {
    streams = [];
    for (var i = 0; i < streamCount; i++) {
      var angle = (i / streamCount) * Math.PI * 2;
      streams.push({
        angle: angle + (Math.random() - 0.5) * 0.25,
        curl: 0.3 + Math.random() * 0.8,
        phase: Math.random() * Math.PI * 2,
        width: 1.2 + Math.random() * 2.5,
        speed: 0.12 + Math.random() * 0.12,
        segments: 40 + Math.floor(Math.random() * 20),
        wobble: 0.3 + Math.random() * 0.5
      });
    }
  }
  initStreams();

  // ── Core Chromatic Glow ──────────────────────────────────────────
  function drawCore() {
    var maxR = Math.min(W, H) * 0.12;

    // Outer glow layers
    for (var g = 3; g >= 0; g--) {
      var r = maxR * (1 + g * 0.5);
      var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      var alpha = 0.04 - g * 0.008;
      grad.addColorStop(0, 'rgba(0, 200, 255, ' + (0.12 - g * 0.025) + ')');
      grad.addColorStop(0.4, 'rgba(0, 150, 255, ' + (0.06 - g * 0.012) + ')');
      grad.addColorStop(1, 'rgba(0, 100, 200, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Bright inner core with chromatic shift
    var hueCore = (t * 8) % 360;
    var innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.6);
    innerGrad.addColorStop(0, 'hsla(' + hueCore + ', 100%, 90%, 0.35)');
    innerGrad.addColorStop(0.3, 'hsla(' + ((hueCore + 40) % 360) + ', 100%, 75%, 0.15)');
    innerGrad.addColorStop(1, 'hsla(' + ((hueCore + 80) % 360) + ', 100%, 60%, 0)');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, maxR * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // Central bright dot
    var dotGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.15);
    dotGrad.addColorStop(0, 'rgba(200, 255, 255, 0.9)');
    dotGrad.addColorStop(0.5, 'rgba(100, 230, 255, 0.4)');
    dotGrad.addColorStop(1, 'rgba(0, 200, 255, 0)');
    ctx.fillStyle = dotGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, maxR * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Orbital Rings ────────────────────────────────────────────────
  function drawRing(ring, angle) {
    var maxDim = Math.min(W, H) * 0.45;
    var rx = ring.radius * maxDim;
    var ry = rx * 0.3;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ring.tilt);

    // Main ring ellipse
    var color = 'hsla(' + ring.hue + ', 80%, 65%, ';
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = color + '0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Secondary inner ring
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * 0.96, ry * 0.96, 0, 0, Math.PI * 2);
    ctx.strokeStyle = color + '0.12)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Glow trace behind particle
    var traceAngle = angle;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, traceAngle - 0.05, traceAngle + 0.05);
    ctx.strokeStyle = 'hsla(' + ring.hue + ', 100%, 80%, 0.6)';
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'hsla(' + ring.hue + ', 100%, 70%, 0.5)';
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Segment dash marks along ring
    var segCount = 24;
    for (var i = 0; i < segCount; i++) {
      var sa = (i / segCount) * Math.PI * 2;
      var pulse = Math.sin(t * 0.5 + i * 0.5) * 0.3 + 0.7;
      ctx.beginPath();
      ctx.ellipse(0, 0, rx, ry, 0, sa, sa + 0.04);
      ctx.strokeStyle = 'hsla(' + (ring.hue + 20) + ', 80%, 70%, ' + (0.05 * pulse) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.restore();

    return { rx: rx, ry: ry };
  }

  // ── Ring Particle ────────────────────────────────────────────────
  function drawRingParticle(ring, dims, angle) {
    var cosT = Math.cos(ring.tilt);
    var sinT = Math.sin(ring.tilt);
    var px = cx + (Math.cos(angle) * dims.rx) * cosT - (Math.sin(angle) * dims.ry) * sinT;
    var py = cy + (Math.cos(angle) * dims.rx) * sinT + (Math.sin(angle) * dims.ry) * cosT;

    // Particle glow aura
    var auraSize = 14 + Math.sin(t * 2 + ring.phase) * 3;
    var grad = ctx.createRadialGradient(px, py, 0, px, py, auraSize);
    grad.addColorStop(0, 'hsla(' + ring.hue + ', 100%, 85%, 0.85)');
    grad.addColorStop(0.3, 'hsla(' + ring.hue + ', 100%, 75%, 0.35)');
    grad.addColorStop(0.6, 'hsla(' + ring.hue + ', 100%, 65%, 0.1)');
    grad.addColorStop(1, 'hsla(' + ring.hue + ', 100%, 60%, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, auraSize, 0, Math.PI * 2);
    ctx.fill();

    // Particle core
    ctx.beginPath();
    ctx.arc(px, py, 2.8, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 25;
    ctx.shadowColor = 'hsla(' + ring.hue + ', 100%, 75%, 0.9)';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Cross flare
    var flareDist = 5;
    ctx.strokeStyle = 'hsla(' + ring.hue + ', 100%, 85%, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px - flareDist, py);
    ctx.lineTo(px + flareDist, py);
    ctx.moveTo(px, py - flareDist);
    ctx.lineTo(px, py + flareDist);
    ctx.stroke();

    return { px: px, py: py };
  }

  // ── Ring Label ────────────────────────────────────────────────────
  function drawRingLabel(ring, dims, angle) {
    var cosT = Math.cos(ring.tilt);
    var sinT = Math.sin(ring.tilt);
    var labelOffset = ring.radius * Math.min(W, H) * 0.48 + Math.min(W, H) * 0.015 + 12;

    // Position label opposite to the particle
    var labelAngle = angle + Math.PI;
    var lx = cx + (Math.cos(labelAngle) * labelOffset) * cosT - (Math.sin(labelAngle) * (labelOffset * 0.3)) * sinT;
    var ly = cy + (Math.cos(labelAngle) * labelOffset) * sinT + (Math.sin(labelAngle) * (labelOffset * 0.3)) * cosT;

    ctx.save();
    var fontSize = Math.round(10 + Math.min(W, H) * 0.009);
    ctx.font = '700 ' + fontSize + 'px Arial, Helvetica, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Label glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'hsla(' + ring.hue + ', 100%, 60%, 0.5)';
    ctx.fillStyle = 'hsla(' + ring.hue + ', 80%, 85%, 0.8)';
    ctx.fillText(ring.label, lx, ly);

    // Brighter overlay
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'hsla(' + ring.hue + ', 80%, 92%, 0.5)';
    ctx.fillText(ring.label, lx - 1, ly - 1);

    ctx.restore();
  }

  // ── Energy Streams ───────────────────────────────────────────────
  function drawStreams(time) {
    var hueOffset = (time * 20) % 360;

    for (var i = 0; i < streams.length; i++) {
      var s = streams[i];
      var hue = (hueOffset + i * 40) % 360;
      var maxDim = Math.min(W, H) * 0.5;

      ctx.beginPath();
      ctx.moveTo(cx, cy);

      for (var j = 0; j <= s.segments; j++) {
        var progress = j / s.segments;
        var dist = maxDim * (0.90 + Math.sin(time * 0.3 + s.phase + i) * 0.08) * progress;
        var angleOffset = Math.sin(progress * Math.PI * 4 + time * s.speed + s.phase) * s.curl * 0.5;
        var drift = Math.sin(progress * Math.PI * 2 + time * 0.15 + s.phase) * s.wobble * 0.15;
        var a = s.angle + angleOffset + drift;
        var px = cx + Math.cos(a) * dist;
        var py = cy + Math.sin(a) * dist;
        ctx.lineTo(px, py);
      }

      // Fade the stream from outer edge to center
      var grad = ctx.createLinearGradient(
        cx + Math.cos(s.angle) * maxDim * 0.95,
        cy + Math.sin(s.angle) * maxDim * 0.95,
        cx, cy
      );
      grad.addColorStop(0, 'hsla(' + hue + ', 100%, 65%, 0)');
      grad.addColorStop(0.15, 'hsla(' + ((hue + 30) % 360) + ', 100%, 70%, 0.25)');
      grad.addColorStop(0.5, 'hsla(' + ((hue + 60) % 360) + ', 100%, 75%, 0.12)');
      grad.addColorStop(1, 'hsla(' + ((hue + 90) % 360) + ', 100%, 85%, 0)');

      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width * (0.8 + Math.sin(time * 0.5 + s.phase) * 0.2);
      ctx.shadowBlur = 8;
      ctx.shadowColor = 'hsla(' + hue + ', 100%, 70%, 0.3)';
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // ── Particle Burst ───────────────────────────────────────────────
  function createBurst() {
    var count = 80;
    var maxDim = Math.min(W, H) * 0.35;
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 4;
      var hue = Math.random() * 360;
      burstParticles.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 1.5 + Math.random() * 3,
        life: 1,
        decay: 0.008 + Math.random() * 0.015,
        hue: hue,
        gravity: (Math.random() - 0.5) * 0.02
      });
    }
  }

  function updateBurst() {
    for (var i = burstParticles.length - 1; i >= 0; i--) {
      var p = burstParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.life -= p.decay;
      if (p.life <= 0) {
        burstParticles.splice(i, 1);
      }
    }
  }

  function drawBurst() {
    for (var i = 0; i < burstParticles.length; i++) {
      var p = burstParticles[i];
      var alpha = p.life * 0.9;
      var size = p.r * (0.5 + p.life * 0.5);

      // Glow
      var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size * 3);
      grad.addColorStop(0, 'hsla(' + p.hue + ', 100%, 85%, ' + (alpha * 0.8) + ')');
      grad.addColorStop(0.3, 'hsla(' + p.hue + ', 100%, 70%, ' + (alpha * 0.3) + ')');
      grad.addColorStop(1, 'hsla(' + p.hue + ', 100%, 60%, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 3, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + p.hue + ', 100%, 92%, ' + alpha + ')';
      ctx.shadowBlur = 15;
      ctx.shadowColor = 'hsla(' + p.hue + ', 100%, 70%, ' + (alpha * 0.6) + ')';
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // ── Background Nebula/Haze ───────────────────────────────────────
  function drawNebula(time) {
    var hue1 = (time * 3) % 360;
    var hue2 = (hue1 + 120) % 360;
    var maxDim = Math.min(W, H) * 0.6;

    // Two subtle nebula clouds
    for (var n = 0; n < 2; n++) {
      var hue = n === 0 ? hue1 : hue2;
      var nx = cx + Math.sin(time * 0.02 + n * 2) * maxDim * 0.2;
      var ny = cy + Math.cos(time * 0.015 + n * 3) * maxDim * 0.15;
      var nr = maxDim * (0.4 + Math.sin(time * 0.01 + n) * 0.1);
      var grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      grad.addColorStop(0, 'hsla(' + hue + ', 60%, 30%, 0.03)');
      grad.addColorStop(0.5, 'hsla(' + ((hue + 60) % 360) + ', 50%, 20%, 0.015)');
      grad.addColorStop(1, 'hsla(' + ((hue + 120) % 360) + ', 40%, 10%, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(nx, ny, nr, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Shimmer Grid (subtle sci-fi grid lines) ──────────────────────
  function drawGrid(time) {
    ctx.save();
    ctx.globalAlpha = 0.015 + Math.sin(time * 0.1) * 0.005;
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.15)';
    ctx.lineWidth = 0.5;

    var spacing = Math.min(W, H) * 0.08;
    var count = Math.max(W, H) / spacing + 4;
    var offsetX = (time * 0.2) % spacing;
    var offsetY = (time * 0.15) % spacing;

    for (var i = -2; i < count; i++) {
      var x = (i * spacing + offsetX) % (W + spacing * 2) - spacing;
      ctx.beginPath();
      ctx.moveTo(x, -spacing);
      ctx.lineTo(x, H + spacing);
      ctx.stroke();
    }
    for (var j = -2; j < count; j++) {
      var y = (j * spacing + offsetY) % (H + spacing * 2) - spacing;
      ctx.beginPath();
      ctx.moveTo(-spacing, y);
      ctx.lineTo(W + spacing, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── Particle Trail (ambient floating particles) ──────────────────
  var ambientParticles = [];
  for (var ap = 0; ap < 30; ap++) {
    ambientParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: 0.5 + Math.random() * 1.5,
      hue: Math.random() * 360,
      life: Math.random(),
      decay: 0.002 + Math.random() * 0.005
    });
  }

  function updateAmbient() {
    for (var i = 0; i < ambientParticles.length; i++) {
      var p = ambientParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0 || p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) {
        p.x = Math.random() * W;
        p.y = Math.random() * H;
        p.vx = (Math.random() - 0.5) * 0.3;
        p.vy = (Math.random() - 0.5) * 0.3;
        p.life = 1;
        p.hue = (p.hue + 30 + Math.random() * 60) % 360;
      }
    }
  }

  function drawAmbient() {
    for (var i = 0; i < ambientParticles.length; i++) {
      var p = ambientParticles[i];
      var alpha = p.life * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + (p.hue + t * 10) % 360 + ', 80%, 70%, ' + alpha + ')';
      ctx.fill();
    }
  }

  // ── Main Loop ────────────────────────────────────────────────────
  function draw(time) {
    if (lastFrameTime === 0) lastFrameTime = time;
    var dt = Math.min((time - lastFrameTime) * 0.001, 0.05);
    lastFrameTime = time;
    timeAccum += dt;
    t = timeAccum;

    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Nebula haze
    drawNebula(t);

    // Starfield (layered)
    for (var si = 0; si < stars.length; si++) {
      var st = stars[si];
      var twinkle = 0.5 + 0.5 * Math.sin(t * st.twinkleSpeed + st.twinkleOffset);
      var alpha = st.b * twinkle;
      // Parallax hint - deeper stars move slower on resize
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
      ctx.fill();

      // Occasional brighter twinkle
      if (twinkle > 0.85) {
        ctx.shadowBlur = 4;
        ctx.shadowColor = 'rgba(200, 230, 255, 0.4)';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    ctx.globalAlpha = 1;

    // Subtle grid
    drawGrid(t);

    // Ambient floating particles
    updateAmbient();
    drawAmbient();

    // Energy streams (behind rings)
    drawStreams(t);

    // Core glow
    drawCore();

    // Orbital rings and their particles/labels
    for (var ri = 0; ri < ringData.length; ri++) {
      var ring = ringData[ri];
      var angle = t * ring.speed + ring.phase;
      var dims = drawRing(ring, angle);
      drawRingParticle(ring, dims, angle);
      drawRingLabel(ring, dims, angle);
    }

    // Particle burst
    updateBurst();
    drawBurst();

    animId = requestAnimationFrame(draw);
  }

  // ── Click/Tap Handler ────────────────────────────────────────────
  canvas.addEventListener('click', function(e) {
    createBurst();
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    createBurst();
  }, { passive: false });

  // ── Start ────────────────────────────────────────────────────────
  animId = requestAnimationFrame(draw);
})();
</script>
</body>
</html>
